name: Build Server

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  macos-aarch64:
    name: macos aarch64
    runs-on: macos-15
    env:
      TARGET: aarch64-apple-darwin
      SQLITE_PREFIX: ${{ github.workspace }}/.sqlite
      SQLITE3_STATIC: "1"
      SQLITE3_LIB_DIR: ${{ github.workspace }}/.sqlite/lib
      SQLITE3_INCLUDE_DIR: ${{ github.workspace }}/.sqlite/include
      LIBSQLITE3_SYS_USE_PKG_CONFIG: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          key: server-macos-aarch64

      - name: Add Rust target
        run: rustup target add "$TARGET"

      - name: Build static SQLite
        run: |
          AR=ar scripts/build-sqlite-static.sh "$SQLITE_PREFIX"

      - name: Build server
        run: cargo build --locked --release --target "$TARGET" --bin tansu2

      - name: Package server
        run: |
          mkdir -p dist
          strip "target/$TARGET/release/tansu2"
          cp "target/$TARGET/release/tansu2" "dist/tansu2-$TARGET"
          tar -C dist -czf "dist/tansu2-$TARGET.tar.gz" "tansu2-$TARGET"
          shasum -a 256 "dist/tansu2-$TARGET.tar.gz" > "dist/tansu2-$TARGET.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: tansu2-aarch64-apple-darwin
          path: |
            dist/tansu2-aarch64-apple-darwin.tar.gz
            dist/tansu2-aarch64-apple-darwin.tar.gz.sha256
          if-no-files-found: error
          compression-level: 0

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/tansu2-aarch64-apple-darwin.tar.gz dist/tansu2-aarch64-apple-darwin.tar.gz.sha256 --clobber

  linux-musl:
    name: linux ${{ matrix.arch }} musl
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            target: x86_64-unknown-linux-musl
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build server in Alpine
        run: |
          docker build \
            --platform "${{ matrix.platform }}" \
            -f docker/linux-musl.Dockerfile \
            --build-arg TARGET="${{ matrix.target }}" \
            --build-arg CARGO_PROFILE=release \
            --output type=local,dest=dist/linux-${{ matrix.arch }} \
            .

      - name: Package server
        run: |
          mkdir -p dist
          mv "dist/linux-${{ matrix.arch }}/tansu2" "dist/tansu2-${{ matrix.target }}"
          tar -C dist -czf "dist/tansu2-${{ matrix.target }}.tar.gz" "tansu2-${{ matrix.target }}"
          sha256sum "dist/tansu2-${{ matrix.target }}.tar.gz" > "dist/tansu2-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: tansu2-${{ matrix.target }}
          path: |
            dist/tansu2-${{ matrix.target }}.tar.gz
            dist/tansu2-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
          compression-level: 0

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/tansu2-${{ matrix.target }}.tar.gz" "dist/tansu2-${{ matrix.target }}.tar.gz.sha256" --clobber
